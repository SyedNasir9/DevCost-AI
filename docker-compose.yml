services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: devcost-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-devcost_ai}
      POSTGRES_USER: ${DB_USER:-devcost}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devcost123}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - devcost-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-devcost} -d ${DB_NAME:-devcost_ai}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # Redis for caching
  redis:
    image: redis:7-alpine
    container_name: devcost-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - devcost-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: devcost-backend
    restart: unless-stopped
    environment:
      # App Configuration
      APP_ENV: ${APP_ENV:-development}
      DEMO_MODE: ${DEMO_MODE:-false}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      
      # Database Configuration
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-devcost_ai}
      DB_USER: ${DB_USER:-devcost}
      DB_PASSWORD: ${DB_PASSWORD:-devcost123}
      DB_SSLMODE: disable
      
      # Redis Configuration
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      
      # Server Configuration
      SERVER_PORT: 8080
      GIN_MODE: ${GIN_MODE:-release}
      
      # JWT Configuration
      JWT_SECRET: ${JWT_SECRET:-}
      JWT_EXPIRE_HOURS: ${JWT_EXPIRE_HOURS:-24}
      
      # AWS Configuration
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      
      # Slack Configuration
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET:-}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    ports:
      - "${SERVER_PORT:-8080}:8080"
    networks:
      - devcost-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Frontend Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080/api/v1}
    container_name: devcost-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080/api/v1}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks:
      - devcost-network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Optional: Database Admin Interface
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: devcost-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@devcost-ai.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - devcost-network
    depends_on:
      - postgres
    profiles:
      - admin

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:

networks:
  devcost-network:
    driver: bridge
